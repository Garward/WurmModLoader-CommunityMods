classname=com.garward.wurmmodloader.mods.supplydepot.SupplyDepotMod
sharedClassLoader=true

# --- Master toggle ----------------------------------------------------------
enabled=true

# When true, only spawn while running on a PvP server. Leave false for PvE
# servers (the original WyvernMods design assumed PvP-only).
requirePvpServer=false

# --- Spawn cadence ----------------------------------------------------------
# Time between depot spawns. Default = 2 hours.
respawnTimeMs=7200000
# How often the poll loop ticks (cheap; just a clock check).
pollIntervalSeconds=30
# Minimum time between "X is capturing the depot!" global broadcasts.
captureMessageInterval=600000

# --- Capture action ---------------------------------------------------------
# Total time to capture, in 1/10 second ticks (2400 = 4 minutes).
captureTimer=2400
fightingSkillRequirement=25
captureRadius=5

# --- Visuals ----------------------------------------------------------------
# Hang a light effect on each depot so it's visible from a distance.
useDepotLights=true

# --- Reward roll ------------------------------------------------------------
# When the `caches` submod is installed, the capture reward includes this
# many extra random caches drawn from its weighted pool.
minCaches=3
maxCaches=4

# Kingdom token drop. 22765 is the upstream WyvernMods token id; set to -1
# to skip. minKingdomTokens..maxKingdomTokens dictate the roll count.
kingdomTokenTemplateId=22765
minKingdomTokens=3
maxKingdomTokens=5

# Percent chance for a HotA statue to drop alongside the rest.
hotaStatueChancePercent=1

# Copper coin reward range (raw copper, converted to iron internally).
minCopperReward=10
maxCopperReward=30

# Optional enchant orb in the reward bundle. Set to a registered item
# template id (e.g. from a future KeyEvent / EnchantOrb submod). -1 disables.
enchantOrbTemplateId=-1

# --- Spawn filter -----------------------------------------------------------
# All spawn-filter values are checked together. Tiles are picked at random
# until one passes every constraint, or we give up after 200 attempts.
#
# Region disc (tile coords, F1 in-game shows the tile under your feet).
# Leave at -1 to disable the region restriction; spawn anywhere on land.
spawnAreaCenterX=-1
spawnAreaCenterY=-1
spawnAreaRadius=-1
#
# Height range (Wurm's encoded height units; 0 == sea level, water below).
# Defaults accept any above-water tile.
spawnMinHeight=1
spawnMaxHeight=999
#
# Maximum tile slope. 30 ~= "not a cliff face".
spawnMaxSlope=30
#
# Tile-type allowlist. Empty = any tile type. Names match
# com.wurmonline.mesh.Tiles.Tile constants. Common picks:
#   TILE_GRASS, TILE_DIRT, TILE_SAND, TILE_STEPPE, TILE_TUNDRA,
#   TILE_SNOW, TILE_CLIFF, TILE_ROCK, TILE_MOSS, TILE_TREE, TILE_BUSH
#spawnTileTypes=TILE_GRASS,TILE_STEPPE
#
# Set true to use the upstream WyvernMods "20-80% of world tile size" ring
# instead of the region disc. Useful only when you've ported the original
# arena map and want depots distributed away from the world edges.
useDefaultArenaRing=false

# --- Spawn filter examples --------------------------------------------------
# Mountain peaks, snow-capped only:
#   spawnMinHeight=400
#   spawnMaxHeight=999
#   spawnMaxSlope=80
#   spawnTileTypes=TILE_SNOW,TILE_CLIFF
#
# Sand desert pocket centered on tile 1200,800 (radius 250):
#   spawnAreaCenterX=1200
#   spawnAreaCenterY=800
#   spawnAreaRadius=250
#   spawnTileTypes=TILE_SAND
#
# Faithful upstream behavior (PvP arena map, ring spawn, no filtering):
#   useDefaultArenaRing=true
#   requirePvpServer=true
