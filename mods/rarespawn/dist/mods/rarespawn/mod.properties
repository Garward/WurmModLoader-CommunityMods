classname=com.garward.wurmmodloader.mods.rarespawn.RareSpawnMod
sharedClassLoader=true

# ============================================================================
# rarespawn -- Reaper, Spectral drake, and Blue wyvern world bosses ported
# from Sindusk's WyvernMods RareSpawns module.
#
# Per-tick behaviour (every pollIntervalSeconds):
#   1. Walk Creatures.getInstance() and add new rares to the live registry.
#   2. Drop dead rares from the registry; if it ends up empty, spawn a new
#      one (random surface tile, height 0..1000, slope < 30, not on a deed)
#      picked at random from {Reaper, SpectralDrake}, then -- if
#      includeWyvernBlue is true -- additionally spawn a Blue wyvern.
#
# WyvernBlue is also a rideable mount (ModVehicleBehaviour); it is always
# registered as a creature template regardless of includeWyvernBlue, so
# disabling that flag only stops the world-spawn cycle, not the mount.
# ============================================================================

# Master toggle. When false, no creature templates register and the poll
# loop is skipped entirely.
enabled=true

# How often the rare-spawn poll runs, in seconds. Each tick is cheap
# (Creatures.getCreatures() walk + registry maintenance); spawn calls only
# happen when the registry has emptied.
pollIntervalSeconds=300

# When true, every poll cycle that spawns a Reaper or Spectral drake also
# spawns a Blue wyvern. Disable to keep the WyvernBlue template available
# as a mount without flooding the world with wild ones.
includeWyvernBlue=true

# --- Spawn filter -----------------------------------------------------------
# All spawn-filter values are checked together. Tiles are picked at random
# until one passes every constraint, or we give up after 200 attempts.
#
# Region disc (tile coords; F1 in-game shows the tile under your feet).
# Leave at -1 to disable the region restriction; spawn anywhere on land.
spawnAreaCenterX=-1
spawnAreaCenterY=-1
spawnAreaRadius=-1
#
# Height range (Wurm's encoded height units; 0 == sea level).
spawnMinHeight=1
spawnMaxHeight=999
#
# Maximum tile slope. 30 ~= "not a cliff face".
spawnMaxSlope=30
#
# Tile-type allowlist. Empty = any tile type. Names match
# com.wurmonline.mesh.Tiles.Tile constants. Common picks:
#   TILE_GRASS, TILE_DIRT, TILE_SAND, TILE_STEPPE, TILE_TUNDRA,
#   TILE_SNOW, TILE_CLIFF, TILE_ROCK, TILE_MOSS, TILE_TREE, TILE_BUSH
#spawnTileTypes=TILE_TUNDRA,TILE_SNOW,TILE_GRASS
#
# Set true to use the upstream WyvernMods "20-80% of world tile size" ring
# instead of the region disc.
useDefaultArenaRing=false
