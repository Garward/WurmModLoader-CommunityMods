classname=com.garward.wurmmodloader.mods.customdeity.CustomDeityMod
sharedClassLoader=true

# ============================================================================
# CustomDeity — config-driven deity affinity / flag / template overrides.
# Generalized from Sindusk's WyvernMods DeityChanges (which hardcoded edits
# to two specific Wyvern Reborn player gods).
#
# Format:  deity-<id>.<flag>=<value>
#
#   <id>    numeric deity ID. Vanilla:
#             1=Fo, 2=Magranon, 3=Vynora, 4=Libila, 5=Wurm, 6=Nogump,
#             7=Walnut, 8=Pharmakos, 9=Jackal, 10=Deathcrawler, 11=Scavenger,
#             12=Giant. Player gods: 31=Tosiek, 32=Nahjo, 33=Nathan,
#             34=Paaweelr, 35=Smeagain, 36=Gary. Custom player gods 100+.
#
#   <flag>  matches a Deity setter in camelCase, dropping the "set" prefix.
#
# Boolean flags (true/false):
#   roadProtector, warrior, favorRegenerator, befriendCreature, befriendMonster,
#   staminaBonus, foodBonus, healer, deathProtector, deathItemProtector,
#   allowsButchering, woodAffinity, metalAffinity, clothAffinity, clayAffinity,
#   meatAffinity, foodAffinity, learner, itemProtector, repairer, waterGod,
#   mountainGod, forestGod, hateGod
#
# Numeric flags:
#   buildWallBonus=<float>
#   templateDeity=<int>   or one of: FO, MAGRANON, VYNORA, LIBILA
#   favoredKingdom=<byte>
#
# Edits apply at ServerStartedEvent. If a deity ID isn't loaded, lines for
# that ID are logged and skipped.
# ============================================================================


# ----- Example: re-skin player god 101 as a Magranon-template mountain warrior
# (this is the upstream Wyvern "Thelastdab" preset — uncomment to apply)
#deity-101.templateDeity=MAGRANON
#deity-101.mountainGod=true
#deity-101.hateGod=false
#deity-101.metalAffinity=true
#deity-101.deathProtector=true
#deity-101.warrior=true
#deity-101.learner=false
#deity-101.repairer=false
#deity-101.befriendCreature=false
#deity-101.healer=false
#deity-101.clayAffinity=false
#deity-101.waterGod=false


# ----- Example: re-skin player god 102 as a Magranon-template mountain god
# (upstream Wyvern "Reevi" preset — uncomment to apply)
#deity-102.templateDeity=MAGRANON
#deity-102.mountainGod=true
#deity-102.waterGod=false
