classname=com.garward.wurmmodloader.mods.wyverncombat.WyvernCombatMod
sharedClassLoader=true
enabled=true

# Combat-rating adjustments inserted into vanilla CombatHandler.getCombatRating:
#  - +2 CR for royalExecutionerBonus when a player with the title fights non-players.
#  - pet CR scales by ownerSoulDepth * 0.02 when petSoulDepthScaling=true.
#  - 0.75x CR multiplier when on a vehicle and vehicleCombatRatingPenalty=true.
combatRatingAdjustments=true
royalExecutionerBonus=true
petSoulDepthScaling=true
vehicleCombatRatingPenalty=true

# Halve the CR contribution of TrueHit/Excel/etc spell effects in vanilla
# CombatHandler.getCombatRating. Even with DUSKombat installed, vanilla CR is
# still consulted (e.g. defender lookups), so this still bites.
adjustCombatRatingSpellPower=true

# Block natural healing on isUnique() creatures by short-circuiting Wound.poll
# wound-tick paths. Periodic regenerate below replaces it.
disableLegendaryRegeneration=true

# Periodic 75 HP heal of one random unique-creature wound (from any source).
# Interval is in seconds. Set 0 to disable the periodic regen.
uniqueRegenerationIntervalSeconds=10
