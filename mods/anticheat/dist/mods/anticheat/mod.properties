classname=com.garward.wurmmodloader.mods.anticheat.AntiCheatMod
sharedClassLoader=true

# ============================================================================
# AntiCheat — server-side anti-cheat patches lifted 1:1 from Sindusk's
# WyvernMods anti-cheat module. Toggle names match upstream so an existing
# operator can copy values across without renaming.
#
# NOTE: this is the skeleton release — the gradle module loads cleanly and
# config is parsed, but no bytecode patches are wired up yet. Behaviors land
# in subsequent porting passes (mapSteamIds is paired with the bounty submod
# port and will land alongside it).
# ============================================================================


# ----- Cave-strip ore hiding -----
# Patch Communicator.sendCaveStrip to mask ore/vein cave tiles that the
# player should not be able to see (no neighbouring open tile, low
# prospecting). Defeats the classic "modified client" view-through-rock
# exploit. Visible tiles, cave exits, and surface tiles are unaffected.
enableSpoofHiddenOre=true

# Above 20 prospecting, players can see veins through rock within
# `prospecting / 18` tiles — a soft replacement for the masking once skill
# is high enough. Disable to keep masking enforced regardless of skill.
prospectingVision=true


# ----- Steam ID mapping -----
# On login, record the player's Steam ID into a ModSupportDb table and warn
# in the server log if a single account is being accessed from multiple
# Steam IDs. Used by the bounty submod to attribute cross-account behavior.
mapSteamIds=true
