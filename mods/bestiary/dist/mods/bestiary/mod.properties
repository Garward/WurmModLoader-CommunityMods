classname=com.garward.wurmmodloader.mods.bestiary.BestiaryMod
sharedClassLoader=true

# ============================================================================
# Bestiary — vanilla creature behavior tweaks ported from Sindusk's WyvernMods
# Bestiary submodule. Custom-creature hooks (Wyvern dragons, Charger, Titans,
# RareSpawns, etc.) are deferred to their own submods; this jar handles the
# vanilla-applicable patches and one-shot template adjustments.
# ============================================================================

# Block skill gain for AFK players whose target isn't the attacker, or whose
# weapon/armour combo can't realistically hurt the mob. Foils horse-on-mob
# hugging macros.
disableAfkTraining=true

# Reject sacrificing unique creatures (vanilla isUnique() — dragons, drakes,
# goblin leaders, troll kings, forest giants, cyclops). Stops cheap karma
# farming with caged uniques.
fixSacrificingStrongCreatures=true

# 1-in-5 chance to apply a random creature modifier (raging/slow/greenish/
# lurking/sly/hardened/scared/champion/sizesmall/mini/tiny) to wild aggressive
# spawns; 1-in-50 of those becomes Champion. Skips uniques and titans.
conditionWildCreatures=true

# Replace CreatureStatus.getSizeMod() with a version that honors
# C_MOD_SIZESMALL / C_MOD_SIZEMINI / C_MOD_SIZETINY in addition to the
# existing combat modifiers. Required for shrunken-creature mods to render.
useCustomCreatureSizes=true

# Auto-Genesis (remove one random negative trait) for any creature born on
# enchanted grass. Broadcasts a local action message.
genesisEnchantedGrassNewborns=true

# Reject hitching unique creatures (vanilla isUnique()) to vehicles. Custom
# uniques (Wyverns, Chargers) get added by their owning submods.
preventLegendaryHitching=true

# Allow archery against ghost-flagged creatures. Vanilla ships isGhost as a
# blocker; flipping it lets bows engage ghost-typed targets.
allowGhostArchery=true

# Log every Creature.doNew spawn (templateid, tilex, tiley, name) at INFO.
# Useful for debugging spawn distribution; noisy in production.
logCreatureSpawns=false

# ----------------------------------------------------------------------------
# One-shot template adjustments (applied at server-start). Tied to
# applyTemplateAdjustments=true; flip off if another mod owns these templates.
# ----------------------------------------------------------------------------
applyTemplateAdjustments=true
