classname=com.garward.wurmmodloader.mods.caches.CachesMod
sharedClassLoader=true

# ============================================================================
# caches — tiered loot caches (armour/artifact/crystal/dragon/gem/moon/potion/
# rift/titan/tool/treasure-map). Ported from Sindusk's WyvernMods Caches +
# TreasureCacheOpenAction. Players right-click an opened cache and receive a
# rolled loot pool scaled by the cache's quality and rarity.
#
# Caches themselves are not minted by this mod; spawn or hand them out via
# any other system (rare-spawn drops, supply depots, GM creation, etc.).
# ============================================================================

# Master toggle. When false, no templates are registered and no actions are
# wired up.
enabled=true

# CSV of custom weapon template ids appended to the artifact-cache pool.
# Upstream WyvernMods includes Club / BattleYoyo / Knuckles / Warhammer here.
# Those custom weapons live in the future combat submod; until they ship,
# leave this blank to use the vanilla artifact pool only. Unregistered ids
# are silently skipped at runtime.
artifactCacheCustomTemplateIds=

# CSV of custom crystal template ids forming the crystal-cache loot pool.
# Upstream uses ChaosCrystal + EnchantersCrystal (deferred to the crystals
# submod). When blank, crystal caches still register but yield nothing —
# leave this blank until the crystals submod ships, or set to e.g.
#   crystalCacheTemplateIds=22769,22770,22769
# (entries can repeat to weight the pool).
crystalCacheTemplateIds=
