classname=com.garward.wurmmodloader.mods.miscchanges.MiscChangesMod
sharedClassLoader=true

# ============================================================================
# Miscellaneous Changes — bug fixes and QoL adjustments lifted 1:1 from
# Sindusk's WyvernMods miscellaneous-changes module. Toggle names match
# upstream so an existing operator can copy values across without renaming.
#
# NOTE: this is the skeleton release — the gradle module loads cleanly but no
# bytecode patches are wired up yet. Toggles are read into config so the mod
# is ready to drop behaviors in via subsequent porting passes.
# ============================================================================


# ----- Information tab (login-time popup) -----
# Whether to show the info tab to all players on login.
enableInfoTab=true
# Tab name shown in the player's chat tabs.
infoTabName=Server
# Repeating lines added to the info tab. Each one needs its own unique
# numeric suffix; values starting with "infoTabLine" are concatenated in
# the order Properties returns them (use sequential numbers if order matters
# to you — Properties iteration is undefined but typically stable per JVM).
#infoTabLine-1:Server thread: https://example.invalid/threads/yours
#infoTabLine-2:Wiki / docs:   https://example.invalid/wiki


# ----- Bridges -----
# Disable most bridge validity checks, allowing bridges to be built into,
# over, or through houses.
ignoreBridgeChecks=true


# ----- Mailboxes & vehicles -----
# Disables the usage of mailboxes while they are loaded in a vehicle. Used
# in tandem with the ability to load mailboxes — without that ability this
# does nothing.
disableMailboxUsageWhileLoaded=true


# ----- Legendary creatures (Uniques) -----
# Adjust the chances for a legendary creature to spawn when checked. Use
# the next setting to tweak how it spawns.
increasedLegendaryCreatures=true
# How many extra rolls happen each spawn check (every 6 hours).
#   0 = disable legendary spawns altogether
#   1 = vanilla
#   2 = double the default chance
#   5 = five times the default chance
increasedLegendaryFrequency=5
# Add the WyvernMods custom Facebreyker creature to the natural unique
# spawn list.
allowFacebreykerNaturalSpawn=true


# ----- Player titles -----
# Server-broadcast a message when a player earns a title. PvP-server titles
# and titles obtained by GMs (power >= 1) are excluded. Will also relay to
# the "event" Discord channel if DiscordRelay is configured.
announcePlayerTitles=true


# ----- Improvement / smithing -----
# Allow leather of any QL to improve items even if it can be combined.
# (Vanilla rejects when item QL exceeds material QL.)
improveCombinedLeather=true
# Allow modded improve templates (Spectral Hide, Glimmerscale).
allowModdedImproveTemplates=true


# ----- Action grounding -----
# Allow players to take fatiguing actions (improve, farm, mine, etc.) while
# not grounded — i.e. mining from a wagon, improving on a horse, etc. On PvP
# servers the destroy action keeps its mounted-block.
fatigueActionOverride=true


# ----- Misc fixes -----
fixPortalIssues=true
# Drop the 0.01 minimum-damage floor on shields so adamantine etc. take
# proportionally less damage than iron.
disableMinimumShieldDamage=true
# Allow GMs (power >= 1) to bypass the 5-second emote sound cooldown.
disableGMEmoteLimit=true
# When a creature is hit by archery from afar it normally fails to acquire
# the player as a target. This option makes it wander a short random
# distance after each hit, eventually breaking out of "free archery" range.
creatureArcheryWander=true
# Broadcast death tabs to GL-Freedom across all servers (does not override
# the local Deaths tab).
globalDeathTabs=true
# Allow PvP deaths on a PvE server to appear in the Deaths tab.
disablePvPOnlyDeathTabs=true
# Old fix attempt for Libila priest faith resetting on server crossing.
# Probably no longer required after the 1.9 priest update; harmless.
fixLibilaCrossingIssues=true


# ----- Food affinities -----
# Boost food affinity skill gain potency from 10% to 30%.
higherFoodAffinities=true


# ----- Production rate -----
# Charcoal piles tick twice per production interval (double burn rate, same
# resource yield).
fasterCharcoalBurn=true


# ----- Traders -----
# Lift the 9-items-per-stock display cap on traders so they can show their
# full inventory.
uncapTraderItemCount=true


# ----- Anti-macro logging -----
# Log any player issuing more than 10 commands in a single second. Useful
# for catching macros — produces false positives on key-held movement.
logExcessiveActions=true


# ----- Skill gain curve -----
# Use the Revenant dynamic skill rate (gain rate adjusts with skill level).
# Reference graph: https://i.imgur.com/XQeMJjV.png
useDynamicSkillRate=true


# ----- Lockpicking -----
# Add 40 QL to lockpick break-check calculations, dropping the break rate
# substantially. Lockpicks still take normal damage.
reduceLockpickBreaking=true


# ----- Mycelium -----
# Allow Libila followers on Freedom to absorb mycelium.
allowFreedomMyceliumAbsorb=true


# ----- Houses -----
# Double the building size players can construct (multiplies effective
# carpentry during planning checks).
largerHouses=true


# ----- Imbues -----
# Reduce the power applied per imbue smear to 1/5th (functionality
# unchanged).
reduceImbuePower=true


# ----- Vehicle speed updates -----
# Vanilla speed updates are gated behind a random check, which can leave a
# vehicle stuck at the wrong speed for many seconds. This forces the update
# to run every time speed should change.
fixVehicleSpeeds=true


# ----- Mail -----
# Reduce mailing cost from 1 copper to 10 iron.
reduceMailingCosts=true


# ----- Guards -----
# Stop guards from joining combat against the stronger modded creatures
# (Legendaries, Titans, Rare Spawns).
guardTargetChanges=true


# ----- Libila on Freedom -----
# Enable the Strongwall spell for Libila on Freedom/PvE servers.
enableLibilaStrongwallPvE=true


# ----- Royal titles -----
# Royal Cooks make "royal" food immune to decay.
royalCookNoFoodDecay=true
# Royal Smiths improve smithing items 10% faster (≈ +10 WoA on the tool).
royalSmithImproveFaster=true


# ----- Mayor abandonment -----
# Mayors temporarily command vehicles abandoned on their deed. Doesn't open
# the cargo hold; ends if they move the vehicle off-deed and disembark; only
# applies if the owner has been offline for 7 days.
mayorsCommandAbandonedVehicles=true


# ----- Food bonuses -----
# Opulence increases affinity timer by 0.25% per power (so a 100-power
# Opulence cast adds 25%).
opulenceFoodAffinityTimerIncrease=true
# Disable the vanilla 10x first-bite affinity duration bonus so each bite
# grants the same duration regardless of order.
disableFoodFirstBiteBonus=true
# Adjust food fill to be non-linear along the QL axis — more fill at low QL,
# tapering at high QL. Graph: https://i.imgur.com/RsBo86z.png
adjustedFoodBiteFill=true


# ----- Sleep -----
# Bed QL boosts sleep bonus on wake — 0.5% per QL of bed (so 100 QL = +50%).
bedQualitySleepBonus=true


# ----- Mounted carry -----
# Repair vanilla mounted-encumbrance check so modded body strength carry
# weight increases register on mounts (otherwise you can be "encumbered on
# a horse" while well under your own carry cap).
fixMountedBodyStrength=true


# ----- Rarity -----
# Rare materials may transfer rarity during normal improve, not only when
# wholly consumed. Removes the "punished for combining rare materials"
# anti-pattern.
rareMaterialImprove=true
# Bad-luck protection for rarity windows — failed rolls increase the next
# roll's chance, successful rolls reset it. Smooths out RNG outliers.
rarityWindowBadLuckProtection=true
# Rarity from creation materials applies to created items. Only triggers
# when an item is created entirely from two consumable resources (e.g. rare
# handle + rare blade -> sword). Anvils are not consumed so don't qualify;
# metallurgy does (rare charcoal + rare iron -> rare steel).
# WARNING: enabling this opens several rarity-cascade exploits, especially
# combined with sacrifice / lye / hide chains. Default off.
rareCreationAdjustments=false
# Armour title improvement bonuses apply at all times (not only while the
# title is equipped).
alwaysArmourTitleBenefits=true


# ----- Sorcery / tomes -----
# Allow tomes to be used at any flat 3x3 altar — drops the height-/water-/
# cave-restriction checks.
tomeUsageAnyAltar=true
# Restrict Key of the Heavens usage to the login server only (avoids a
# deity-generation issue on cluster setups).
keyOfHeavensLoginOnly=true


# ----- Drinks -----
# Drinks (not water) fill the water bar ~1/5 as much as vanilla, so affinity
# drinks last longer.
lessFillingDrinks=true


# ----- Help / GM -----
# Hide GM commands from /help output for non-GM players (fixes a vanilla
# leak).
disableHelpGMCommands=true


# ----- Action interruption -----
# Roughly halve the chance of an action being interrupted by incoming damage.
reduceActionInterruptOnDamage=true


# ----- Mission system -----
# Lazy-init the Epic Mission item-template list so a missing init can't NPE
# the server later when a random template is requested.
fixMissionNullPointerException=true


# ----- Smelting pots -----
# Disable smelting pot functionality. The item still exists but emits
# "Smelting is disabled." when used.
disableSmeltingPots=true


# ----- Sorcery UI -----
# Hide sorcery buff icons from the buff bar (still listed in Spell Effects).
hideSorceryBuffBar=true


# ----- Achievements -----
# Patch around the achievement SQL errors introduced in WU 1.9.
sqlAchievementFix=true


# ----- Title cosmetics -----
# Rename the female-form 100-farming "Pumpkin King" title to "Pumpkin Queen".
changePumpkinKingTitle=true
# Tweak deity passives for demigods (deity IDs 101 and 102). Specifically a
# Revenant compatibility shim — to be moved to the deity submod once that
# port lands.
changeDeityPassives=true


# ============================================================================
# Vanilla item-template tweaks (folded from upstream ItemMod.modifyItems()).
# Each toggle reflects one private field on the corresponding ItemTemplate;
# applied at ItemTemplatesCreatedEvent (after vanilla Items.createItems()).
# Custom items shipped by WyvernMods (caches, sorcery fragments, Spectral /
# Glimmerscale armour, Titan weapons, etc.) belong to their owning submods.
# ============================================================================

# ---- Stackability / volume ----
combineLeather=true
combineLogs=true
# Reduce log volume by lowering centimetersZ to 50 (default 100). Recomputed
# volume is fed back into ItemTemplate.volume so containers behave correctly.
reduceLogVolume=true
# Reduce kindling volume below logs (centimetersY/Z to 10 each).
reduceKindlingVolume=true

# ---- Drop / pickup gating ----
droppableSleepPowder=true
oneHandedLongSpear=false

# ---- Loadable furniture (transportable=true on placeable items) ----
# Loadable mailboxes — auto-disabled on PvP servers regardless of this flag.
loadableMailbox=true
loadableBellTower=true
loadableTrashBin=true
loadableAltars=true

# ---- Decorations ----
decorationStoneKeystone=true
decorationMarbleKeystone=true
decorationSkull=true

# ---- Difficulty tweaks (vanilla 100 → 50) ----
reduceDirtDifficulty=false
reduceSandDifficulty=false
reduceSandstoneDifficulty=false

# ---- Fixed-price tweaks (iron coin) ----
# Silver mirror at 20s (default 1c).
setSilverMirrorPrice=false
silverMirrorPriceIron=200000
# Golden mirror at 1g (default 1c).
setGoldMirrorPrice=false
goldMirrorPriceIron=1000000
# Creature crates priced at the configured value (default 10s) and forced to
# fullprice = true so traders pay the full sticker.
setCreatureCratePrice=false
creatureCratePriceIron=100000
# Resurrection stones priced at 2s (default 5s).
setResurrectionStonePrice=false
resurrectionStonePriceIron=20000
# Shaker orbs priced at 2s (default 5s).
setShakerOrbPrice=false
shakerOrbPriceIron=20000

# ---- Statue fragmentation tuning ----
# Adjust fragmentAmount on the eight vanilla god/animal statues (40-50 each).
adjustStatueFragmentCount=false

# ---- Skill-requirement removals (creation entries) ----
# Remove the lockpick creation skill requirement. Applied at server-started.
removeLockpickSkillRequirement=false
