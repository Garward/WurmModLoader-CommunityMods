classname=com.garward.wurmmodloader.mods.mastercraft.MastercraftMod
sharedClassLoader=true
enabled=true

# === Skill check difficulty bonuses ===
# Each affinity tick (Skill.affinity) reduces skill-check difficulty by 1.
affinityDifficultyBonus=true
# Knowledge > 99: difficulty reduced by up to 2 (linearly approaching 0 at 99.0).
legendDifficultyBonus=true
# Knowledge > 90: difficulty reduced by up to 2 (linearly approaching 0 at 90.0).
masterDifficultyBonus=true
# Item rarity: difficulty reduced by item.getRarity() (0-3).
itemRarityDifficultyBonus=true
# Item QL > 99: difficulty reduced by up to 1.
legendItemDifficultyBonus=true
# Item QL > 90: difficulty reduced by up to 1.
masterItemDifficultyBonus=true

# === Spell channeling bonuses ===
# Channeling skill + affinity adds bonus power to spells (random roll up to skill knowledge).
empoweredChannelers=true
# Channeling skill + affinity reduces favor cost (up to ~20% at 100 + 2% per affinity).
channelSkillFavorReduction=true
