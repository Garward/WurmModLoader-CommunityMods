classname=com.garward.wurmmodloader.mods.qualityoflife.QualityOfLifeMod
sharedClassLoader=true

# Allow mining cave wall directly into the vehicle you are commanding.
# Requires fatigueActionOverride from the miscchanges mod (otherwise mining
# while commanding a vehicle is blocked outright). Deposits into BSB →
# crates → cargo hold; falls back to ground if everything is full.
mineCaveToVehicle=true

# Same as mineCaveToVehicle but for surface mining.
mineSurfaceToVehicle=true

# Same as mineCaveToVehicle but for chopping up felled logs.
chopLogsToVehicle=true

# Allow casting using a statuette of any material (not just gold/silver).
# Wrong-deity statuettes are still rejected.
statuetteAnyMaterial=true

# Same as mineCaveToVehicle but for mining gems / source crystals / flint /
# salt and other tertiary materials.
mineGemsToVehicle=true

# Regenerate stamina while sitting stationary on a vehicle regardless of
# slope. Vanilla blocks regen on slopes >20.
regenerateStaminaOnVehicleAnySlope=true
