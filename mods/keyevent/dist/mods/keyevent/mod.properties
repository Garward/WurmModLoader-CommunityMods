classname=com.garward.wurmmodloader.mods.keyevent.KeyEventMod
sharedClassLoader=true

# ============================================================================
# keyevent -- "Call upon the heavens" ritual + tomes (key fragment, enchant
# orb, eternal orb, affinity orb). Ported from Sindusk's WyvernMods KeyEvent
# + KeyFragment + EnchantOrb + EternalOrb + AffinityOrb + their actions.
#
# Items registered:
#   mod.fragment.key       -- 50 fragments combine into the Key of the Heavens
#   wyvern.enchantorb      -- transferable enchant container
#   mod.item.eternal.orb   -- absorbs an enchant set into a fresh enchantorb
#   wyvern.affinityorb     -- BML question picks one of 10 random skill affinities
#
# Actions registered:
#   "Call upon the heavens" on a key fragment (you must own >= fragmentsRequired)
#   "Transfer enchant"      enchant orb -> any enchantable item
#   "Absorb enchants"       eternal orb -> any enchanted item (consumes orb,
#                           emits a fresh enchant orb carrying the enchant set)
#   "Gain affinity"         affinity orb -> opens BML; pick one of 10 random
#                           skills derived from the orb's auxData seed
#
# The KeyCombinationAction broadcasts to GL-Freedom over a ~6-minute ritual;
# the casting player answers each deity's question in GL-Freedom chat. Player
# messages are intercepted via PlayerMessageEvent only while the ritual is
# active and only from the casting player.
# ============================================================================

# Master toggle. When false no item templates register and no actions install.
enabled=true

# How many key fragments must be in the casting player's inventory to start
# (and to still be there at completion). Upstream is 50.
fragmentsRequired=50
