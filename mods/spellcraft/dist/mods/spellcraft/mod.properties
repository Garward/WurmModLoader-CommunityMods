# Spellcraft Mod Properties
# Ported to WurmModLoader framework

# Mod metadata
classname=com.garward.wurmmodloader.mods.spellcraft.SpellcraftMod

# Load order
depend.ondemand=false

# Module name for logging
name=Spellcraft

# Faith & Prayer System
maximumPlayerFaith=200
priestFaithRequirement=10
hourlyPrayer=true
scalePrayerGains=true
newFavorRegen=true

# Enchant & Spell Systems
useNewDamageModifier=true
improvedEnchantGrouping=true
statuetteTweaks=true
onlyShowValidSpells=true
allSpellsGamemasters=true
crossFaithLinking=true
fixHighPowerEnchants=true
enableEnchantDecay=false

# Enchant Decay Settings (if enabled)
enchantDecayRate=1.0
enchantDecayMinimum=10.0

# Rite Requirements (scaled for smaller servers)
rite.holyCrop.favorRequired=10000
rite.death.favorRequired=10000
rite.spring.favorRequired=10000
rite.sun.favorRequired=10000

# Custom Spell Defaults
# Format: spell.<name>.<property>=<value>
# Properties: gods (0-4), casttime, cost, difficulty, faith, cooldown

# Harden - Item damage reduction enchant
spell.harden.gods=0,1,2,3,4
spell.harden.casttime=5
spell.harden.cost=30
spell.harden.difficulty=30
spell.harden.faith=20
spell.harden.cooldown=180

