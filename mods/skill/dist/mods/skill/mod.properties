classname=com.garward.wurmmodloader.mods.skill.SkillMod
sharedClassLoader=true

# ============================================================================
# Skill — skill-gain curve, skill renames, difficulty/tickTime overrides,
# preaching dependency rewrite. Ported from Sindusk's WyvernMods skill module.
# Toggle names match upstream so an existing operator can copy values across
# without renaming.
# ============================================================================


# ----- Hybrid Skill Gain -----
# Replaces vanilla's flat skill-gain multiplier with a Wurm-Online-style curve
# where ticks closer to zero give more skill than easy ticks. Subscribes to the
# framework's SkillGainMultiplierEvent — no bytecode patching in mod-space.
# Visual graph of the default curve: https://i.imgur.com/9ykw5dJ.png
# Formula:
#   valueAtOneHundred * (valueAtZero/valueAtOneHundred) ^
#       ((2 - (100/(100+max(-99,power)))^negativeDecayRate) *
#        ((100-power)*0.01)^positiveDecayRate)
enableHybridSkillGain=true

# > 0. How sharply the curve declines past zero going negative. Higher = the
# midpoint moves positive and the post-midpoint decline is steeper.
hybridNegativeDecayRate=5

# > 0. How sharply the curve declines past zero going positive. Higher = a
# tighter curve toward 1.0 in the > 0 region.
hybridPositiveDecayRate=3

# > 0, must be greater than hybridValueAtOneHundred. Multiplier at power = 0.
hybridValueAtZero=3.74

# > 0, must be less than hybridValueAtZero. Multiplier at power = 100.
hybridValueAtOneHundred=0.9


# ----- Skill renames -----
# Format: skillName-#:skill,newName
#   skill   = numeric ID, or skill name (case-insensitive). Examples: 1008,
#             mining, MINING, "Lock Picking".
#   newName = new display name. Carries to the in-game skill list.
# Default values rename Preaching/Stealing to match the GemAug + Soulstealing
# submods. Comment them out if you don't ship those mods.
skillName-1:Preaching,Gem augmentation
skillName-2:Stealing,Soulstealing


# ----- Skill difficulty overrides -----
# Format: skillDifficulty-#:skill,difficulty
# Most skills default to 4000. Lower = faster skill gain (2000 doubles, 8000
# halves). Mining defaults to 8000, Meditating/Lock picking to 2000.
skillDifficulty-1:Mining,3000
skillDifficulty-2:Lock Picking,700
skillDifficulty-3:Meditating,300


# ----- Skill tick-time overrides -----
# Format: skillTickTime-#:skill,milliseconds
# Time players must wait between ticks of a given skill. Vanilla Lock Picking
# enforces 600000 (10 min); Stealing 600000; Meditating has its own timer.
# Setting Stealing to 0 makes it useful as the Soulstealing skill base.
skillTickTime-1:Stealing,0
skillTickTime-2:Meditating,3600000


# ----- Move Preaching under Masonry -----
# Re-parents the Preaching skill so it depends on Masonry instead of Religion.
# Used by the GemAug submod which surfaces Preaching as "Gem augmentation."
# Recommended off if you aren't shipping GemAug.
changePreachingLocation=true
