classname=com.garward.wurmmodloader.mods.mission.MissionMod
sharedClassLoader=true

# ============================================================================
# Mission — epic mission tweaks ported from Sindusk's WyvernMods MissionCreator
# (the `enableMissionModule` block) plus the GM body-menu MissionAdd /
# MissionRemove actions. Only vanilla-applicable patches land here; the
# upstream isMissionOkay* filters drop their RareSpawns/Titans checks because
# those custom-creature submods aren't ported yet.
# ============================================================================

# ----- Patch toggles (apply at preInit) -----

# When a player completes an epic mission TriggerEffect, also award
# 2000-3999 iron coin (random). Hooks PlayerInfo.addToSleep inside
# TriggerEffect.effect.
addMissionCurrencyReward=true

# Stop epic mission spawns landing in water tiles. Patches
# EpicServerStatus.spawnSingleCreature: isSwimming check is short-circuited
# to false so the spawn is never accepted on swimming templates.
preventMissionOceanSpawns=true

# Tighten which templates are eligible for herbivore epic missions.
# Drops submerged + unique templates (vanilla isHerbivore is left intact
# otherwise). Patches createSlayCreatureMission / createSlayTraitorMission /
# createSacrificeCreatureMission.
additionalHerbivoreChecks=true

# Tighten which templates are eligible for slay epic missions. Drops
# submerged + unique templates. Patches createSlayCreatureMission and
# createSacrificeCreatureMission.
additionalMissionSlayableChecks=true

# Disable epic mission types 108, 120 and 124 (the WyvernMods-banned ones —
# fetch-Hota-pillar / collect-rare-resource flavors that don't generalise to
# vanilla maps). Patches EpicMissionEnum.getMissionChance to return 0 for
# those entries.
disableEpicMissionTypes=true

# ----- Periodic mission rotation -----

# When true, periodically detect expired or completed epic missions, destroy
# them and create a fresh one for an entity that doesn't have a mission yet.
# Off by default — admins should opt in once they've checked the rotation
# matches their server's pacing.
enableMissionPoll=false

# Seconds between mission-poll ticks when enableMissionPoll=true. Default is
# 1 hour; the upstream poll runs constantly, but anything finer than this
# isn't useful for week-long missions.
pollIntervalSeconds=3600

# ----- GM body-menu actions (power >= 5) -----

# Adds a "Add Epic Mission" entry on a GM's own body that picks a random
# entity without a current mission and creates one for it. Off by default;
# enable on test/dev servers where you want the GM tooling.
enableMissionAddAction=false

# Adds a "Remove Epic Mission" entry on a GM's own body that removes the
# current mission for the first entity that has one. Useful to clear a
# stuck rotation. Off by default.
enableMissionRemoveAction=false
