classname=com.garward.wurmmodloader.mods.bounty.BountyMod
sharedClassLoader=true

# ============================================================================
# bounty — coin reward for slaying creatures, plus pluggable corpse-loot.
# Ported from Sindusk's WyvernMods Bounty / PlayerBounty / LootBounty (the
# vanilla-applicable subset). Custom-creature loot (Titans, RareSpawns,
# Wyvern uniques, AffinityOrb, FriyanTablet, the cache items, etc.) lives
# in their owning submods and plugs in via BountyRegistry.
#
# Extensibility surface:
#   - BountyRegistry.setReward(name|templateId, iron)
#   - BountyRegistry.setTypePrefixMultiplier(prefix, mult)
#   - BountyRegistry.addCorpseLootHandler(handler)
#   - BountyRegistry.addKillerRewardHandler(handler)
#   - BountyRegistry.setStrengthFunction(fn)
# ============================================================================

# ---- Master toggles ----

# Award iron coin to the killing player when they slay a non-player creature.
# Coin is computed from the creature's strength (see strength.* below) and
# the type-prefix multiplier table (see prefix.* below). Vanilla coin-on-kill
# is left intact — the bounty is paid on top of it.
enablePlayerBounty=true

# Insert corpse-loot extras when a creature dies. Built-in handlers are
# gated by their own toggles below. Third-party mods can register more
# handlers via BountyRegistry.addCorpseLootHandler.
enableCorpseLoot=true

# Built-in: random metal lump (adamantine/brass/bronze/copper/glimmersteel/
# gold/iron/lead/silver/steel/zinc) on goblin corpse, QL 20-80.
enableGoblinMetalDrop=true

# Built-in: champion-tier creatures get extra loot (random tool, 75% chance
# of an addy/glimmer bar, 5% chance of a mask, 1% chance of a rare bone).
enableChampionLoot=true

# When true, broadcast "X had something of interest..." on the local channel
# whenever a corpse-loot handler reports an interesting drop.
broadcastInterestingLoot=false

# ---- Coin clamps ----
#
# Note on the killer attribution: the framework's CreatureDeathEvent
# delivers a single `killer` field — the highest-damage attacker captured
# at death. That already filters out players who hit once and walked off,
# so this submod doesn't duplicate the upstream "combatant in last 2 min"
# check. If you want to award coin to every recent damager (group play /
# arena), register a KillerRewardHandler that walks your own damage map.

# Multiplier applied on PvP servers (Servers.localServer.PVPSERVER == true).
# Default 1.2 mirrors upstream WyvernMods.
pvpBountyMultiplier=1.2

# Floor / ceiling for the final bounty in iron. 0 disables the floor;
# 0 in ceiling disables the cap. Iron values: 1c = 100i, 1s = 10000i,
# 1g = 1000000i.
bountyFloorIron=0
bountyCeilingIron=0

# ---- Strength formula ----

# Default formula (mirrors upstream Bounty.getCreatureStrength):
#
#   raw = combatRating * cbrt(maxDmg) * cbrt(fightSkill / armourMod) *
#         cbrt(bodyStrength)
#   raw *= strength.scale
#   raw  = raw + strength.floor
#   capped via raw * 2^(-raw/k) + k * (1 - 2^(-raw/k)) / (1 + 2^(-raw/k))
#
# strength.scale     pre-cap multiplier on the raw value (default 0.8)
# strength.floor     additive floor (default 100)
# strength.cap       k constant in the soft cap (default 100000)
strength.scale=0.8
strength.floor=100
strength.cap=100000

# ---- Type prefix multipliers ----
#
# Prefix lookup uses Creature.getPrefixes() which returns strings like
# "fierce ", "raging champion ", etc. (note the trailing space).
# Match is suffix endsWith on the lowercased prefix string. Set a
# multiplier to 1.0 to disable a particular prefix bonus.
prefix.fierce=1.5
prefix.angry=1.4
prefix.raging=1.6
prefix.slow=0.95
prefix.alert=1.2
prefix.greenish=1.7
prefix.lurking=1.1
prefix.sly=0.8
prefix.hardened=1.3
prefix.scared=0.85
prefix.diseased=0.9
prefix.champion=2.0

# ---- Per-creature reward overrides ----
#
# Override the strength-derived bounty with a fixed iron amount for a
# named creature. Match is case-insensitive on the lowercased template
# name (Creature.getTemplate().getName().toLowerCase()).
#
# Add as many as you like:
#   rewardOverride.<creature name>=<iron>
#
# Examples:
# rewardOverride.black wolf=750
# rewardOverride.spider=400
# rewardOverride.troll=1500
# rewardOverride.lava fiend=8000
