classname=com.garward.wurmmodloader.mods.titan.TitanMod
sharedClassLoader=true

# ============================================================================
# titan -- Lilith and Ifrit raid bosses + their wraith/zombie/fiend/spider
# minions, scripted boss fight, server-wide percentage announcements,
# auto-spawn after a configurable cooldown. Ported from Sindusk's
# WyvernMods Titans module.
#
# Per-tick behaviour (every pollIntervalSeconds):
#   1. Walk Creatures.getInstance() and add new titans to the live registry.
#   2. Drop dead titans from the registry; if the registry is empty AND
#      lastSpawnedTitan + respawnTimeMs has expired, spawn a fresh titan
#      (random surface tile, not on a deed, height 0..1000, slope < 30).
#   3. For each living titan: percentage milestone messages and
#      ability/minion summons (basic ability at 60%/50%/30%/20%; advanced
#      ability at 40%/20%/10%; summon-minions at 75%/50%/10%; summon-
#      champions at 30%/10%). Plus a random heal of 5 severity per tick.
#
# Persistence: ObjectiveTimers row id="TITAN" in the modsupport DB tracks
# the last spawn timestamp across restarts. The table is created if missing.
# ============================================================================

# Master toggle. When false, no creature templates register, no patches
# install, and the poll loop is skipped entirely.
enabled=true

# Time between titan spawns once the registry is empty, in milliseconds.
# Upstream default is three days (259200000). Lower this for live testing
# (e.g. 60000 for one minute).
respawnTimeMs=259200000

# How often the titan poll runs, in seconds. Each tick is cheap if no titan
# is alive (one Creatures.getCreatures() walk + one timer compare); when a
# titan is alive each tick may spawn minions or AoE abilities.
pollIntervalSeconds=5

# When true, installs a Wound bytecode patch that disables natural healing,
# infection progression, and poison ticks on titan creatures. Players have
# to actually beat them down -- they cannot be outlasted.
disableNaturalRegeneration=true

# Cross-submod template ids resolved at boot. Both default to -1 (skipped);
# set them after the caches submod logs the assigned ids:
#   [caches] registered mod.item.cache.artifact (id=NNN)
#   [caches] registered mod.item.cache.treasure.map (id=NNN)
# When set, dead titans drop one of the two caches (50/50) at QL 90..100
# from titan inventory, in addition to the corpse.
artifactCacheTemplateId=-1
treasureMapCacheTemplateId=-1

# --- Spawn filter -----------------------------------------------------------
# All spawn-filter values are checked together. Tiles are picked at random
# until one passes every constraint, or we give up after 5000 attempts.
#
# Region disc (tile coords; F1 in-game shows the tile under your feet).
# Leave at -1 to disable the region restriction; spawn anywhere on land.
spawnAreaCenterX=-1
spawnAreaCenterY=-1
spawnAreaRadius=-1
#
# Height range (Wurm's encoded height units; 0 == sea level).
spawnMinHeight=1
spawnMaxHeight=999
#
# Maximum tile slope. 30 ~= "not a cliff face".
spawnMaxSlope=30
#
# Tile-type allowlist. Empty = any tile type. Names match
# com.wurmonline.mesh.Tiles.Tile constants. Common picks:
#   TILE_GRASS, TILE_DIRT, TILE_SAND, TILE_STEPPE, TILE_TUNDRA,
#   TILE_SNOW, TILE_CLIFF, TILE_ROCK, TILE_MOSS, TILE_TREE, TILE_BUSH
#spawnTileTypes=TILE_TUNDRA,TILE_SNOW
#
# Set true to use the upstream WyvernMods "20-80% of world tile size" ring
# instead of the region disc. Useful only when you've ported the original
# arena map and want titans pushed away from the world edges.
useDefaultArenaRing=false
