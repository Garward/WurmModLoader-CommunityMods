classname=com.garward.wurmmodloader.mods.treasurechest.TreasureChestMod
sharedClassLoader=true

# ============================================================================
# treasurechest — replaces vanilla treasure-chest tier distribution and loot
# tables. Ported from Sindusk's WyvernMods enableTreasureChestLootModule.
#
# Vanilla rolls a 0-9 auxData per chest; this mod widens that to 0-99 and
# introduces three tiers (rare 0-59, supreme 60-89, fantastic 90-99) with
# corresponding loot pools (source crystals, addy/glimmer/seryll bars, gems,
# rift items, sorcery gems, dragon hide/scale, hota statues, affinity orbs).
# ============================================================================

# Master toggle. When false, no patches are installed and vanilla tier
# distribution + loot table run as-is.
enabled=true

# Widen the chest auxData roll from 0-9 (vanilla) to 0-99. This is what
# enables the rare/supreme/fantastic tier distribution; without it, every
# chest would land in the rare-tier branch.
boostTierDistribution=true

# Replace Item.fillTreasureChest with the tiered loot table.
replaceLootTable=true

# Template ID of the Affinity Orb spawned in higher-tier chests. Upstream
# WyvernMods ships AffinityOrb at id 22767. If the template isn't registered
# (e.g. you're not running the WyvernMods custom-items submod that owns it),
# the orb branch silently no-ops. Set to 0 to disable orb spawns regardless.
affinityOrbTemplateId=22767
