classname=com.garward.wurmmodloader.mods.soulstealing.SoulstealingMod
sharedClassLoader=true

# ============================================================================
# soulstealing — Eternal Reservoirs that drain corpse-souls and feed nearby
# branded carnivores + lit forges. Ported from Sindusk's WyvernMods
# Soulstealing module + the SoulstealAction / EternalReservoirCheckFuel /
# EternalReservoirRefuel actions and the Soul / EternalReservoir item
# templates.
#
# Player flow:
#   1. Activate sacrificial knife, right-click corpse -> "Soulsteal" action
#      yields a Soul item (QL = stealing skill check power, name encodes the
#      original creature name).
#   2. Activate a Soul, right-click Eternal Reservoir -> "Feed soul" raises
#      the reservoir's fuel by the soulStrength skill check power.
#   3. Reservoirs auto-poll the surrounding tile radius (range = QL/10):
#      branded carnivores with hunger>10000 are fed (-10000 hunger / 50 fuel),
#      lit forges/ovens below 20000 temperature are stoked (+10000 temp /
#      15 fuel).
# ============================================================================

# Master toggle. When false, item templates and actions are not registered
# and the poll loop is skipped.
enabled=true

# Poll interval for the eternal-reservoir tick, in seconds. Upstream default
# is 600 (ten minutes); shorter intervals make reservoirs feel more active
# but multiply the per-tick zone scan cost.
pollIntervalSeconds=600

# When true, registers the upstream creation entry for the Eternal Reservoir
# (pottery primary, dirt-pile target, plus brick-pottery / heart sub-parts
# and a chaos-crystal cost). Requires chaosCrystalTemplateId to be a valid
# template id at registration time; leave disabled until the crystals submod
# ships.
registerCreationEntry=false

# Template id of the chaos-crystal item used as a creation requirement when
# registerCreationEntry=true. Leave -1 to skip (creation entry will not be
# registered even if the toggle is on).
chaosCrystalTemplateId=-1
