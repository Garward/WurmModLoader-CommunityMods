classname=com.garward.wurmmodloader.mods.teleport.TeleportMod
sharedClassLoader=true

# ============================================================================
# Teleport — custom teleport actions + arena-server transfer landing
# ported 1:1 from Sindusk's WyvernMods teleport module. Toggle names match
# upstream so an existing operator can copy values across without renaming.
# ============================================================================


# ----- Arena landing redirect -----
# Patch PlayerMetaData.save so that any player whose stored position falls in
# the small 4000–4050 / 4000–4050 box (the vanilla "transfer landing" zone
# used when arriving from another server) is teleported to a real spawn
# point on the next save:
#   - if they're a citizen of a deed, the deed token,
#   - else on a PvE server, JENNX/JENNY,
#   - else on a PvP server, a random walkable surface tile not inside a deed.
# Set false on servers that don't use the 4000–4050 transfer landing
# convention (single-server installs, custom maps, etc.).
useArenaTeleportMethod=true


# ----- Custom action: Arena Teleport / Arena Escape -----
# Adds two body-targeted actions:
#   - Arena Teleport (PvE only): 60-second meditation channel that transfers
#     the player to the configured "arena" server (Servers.localServer.serverNorth).
#   - Arena Escape (PvP only):  180-second meditation channel that transfers
#     the player back to the home server (Servers.localServer.serverSouth).
# Disable on installs that don't have a north/south server pair configured.
actionArenaTeleports=true


# ----- Custom action: Village Teleport -----
# Adds a body-targeted "Village Teleport" action (PvE, citizens only): a
# 60-second channel that teleports the player to their village token. Off by
# default — upstream defined the action class but never actually registered
# it; opting in restores the feature.
actionVillageTeleport=false
