classname=com.garward.wurmmodloader.mods.erosion.ErosionMod
sharedClassLoader=true

# ============================================================================
# Erosion — periodic background terrain smoothing. Ported from Sindusk's
# WyvernMods erosion module (the `enableErosionModule` toggle + the poll
# that drives `SmoothTerrainAction.onServerPoll()`). PvE-only — disables
# itself on PvP servers.
# ============================================================================

# Interval between erosion ticks, in seconds. Each tick picks one random
# surface tile and smooths a 20x20 area around it if the tile qualifies
# (grass, sand, tundra, steppe, snow, tree, bush — never rock/clay/marsh,
# never inside deeds, perimeters, or structures).
#
# Default 30s matches upstream's `pollTerrainSmoothTime` value
# (TimeConstants.SECOND_MILLIS * 30). Lower = more aggressive smoothing,
# higher = lighter touch.
pollIntervalSeconds=30
