classname=com.garward.wurmmodloader.mods.meditation.MeditationMod
sharedClassLoader=true

# ============================================================================
# Meditation — meditation-path balance changes. Ported from Sindusk's
# WyvernMods MeditationPerks module. Toggle names match upstream so existing
# operators can copy values from WyvernMods.properties without renaming.
# ============================================================================


# ----- Path-of-cult tweaks -----

# Replace vanilla's path selection (based on tile distance to landmarks) with
# a straightforward terrain-type lookup: grass/bush/tree -> Love, mycelium ->
# Hate, sand -> Knowledge, rock/cliff -> Power, underground -> Insanity.
simplifyMeditationTerrain=true

# Path of Insanity: remove the "shield of the gone" half-damage effect.
# Cultist.getHalfDamagePercentage returns 0 instead of vanilla's level scaling.
removeInsanitySotG=true

# Path of Hate: remove the war-damage doubling effect.
# Cultist.mayStartDoubleWarDamage and doubleWarDamage return false.
removeHateWarBonus=true

# Path of Insanity: replace vanilla Actions.getStaminaModiferFor with a
# version that trims stamina cost from level 7 onwards (-2% per level above 6).
insanitySpeedBonus=true

# Path of Hate: +1% movement speed per level above 2 (capped by level).
# Bonus applied multiplicatively after vanilla MovementScheme.getSpeedModifier.
hateMovementBonus=true

# Path of Power: +5% stamina regen per level above 6 (additive).
# Patched into CreatureStatus.modifyStamina before the usesNoStamina branch.
scalingPowerStaminaBonus=true

# Path of Knowledge: +5% skill gain per level above 6.
# Patched into Skill.alterSkill before the levelElevenSkillgain branch.
scalingKnowledgeSkillGain=true

# Remove the vanilla artificial last-meditated tick timer in Cults.meditate
# so the only gating left is the per-skill tickTime (configurable via the
# `skill` submod).
removeMeditationTickTimer=true

# Send passive-buff icons to Cultist clients for their level-gated abilities
# (insanity sotg-gone marker, knowledge skill-gain banner, power
# stamina-bonus, hate move-bonus).
newMeditationBuffs=true


# ----- Meditation ability cooldowns -----

# When true, all 11 may*() ability gates on Cultist are rewritten to consult
# the per-ability cooldowns below (in milliseconds). When false, cooldowns
# fall back to vanilla.
enableMeditationAbilityCooldowns=true

# Defaults: 18 hours = 64800000 ms.
loveRefreshCooldown=64800000
loveEnchantNatureCooldown=64800000
loveLoveEffectCooldown=64800000
hateWarDamageCooldown=64800000
hateStructureDamageCooldown=64800000
hateFearCooldown=64800000
powerElementalImmunityCooldown=64800000
powerEruptFreezeCooldown=64800000
powerIgnoreTrapsCooldown=64800000
knowledgeInfoCreatureCooldown=64800000
knowledgeInfoTileCooldown=64800000
