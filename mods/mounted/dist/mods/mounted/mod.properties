classname=com.garward.wurmmodloader.mods.mounted.MountedMod
sharedClassLoader=true

# ============================================================================
# Mounted — mount-speed scaling changes. Ported from Sindusk's WyvernMods
# MountedChanges module. Toggle names match upstream so existing operators
# can copy values from WyvernMods.properties without renaming.
# ============================================================================


# Replace vanilla's per-creature getMountSpeedPercent formula with a
# version that gives proper weight to horseshoe/saddle quality, rarity, and
# spell speed bonus, and that adds gear damage on each tick.
#
# Implemented via the framework's MountSpeedPercentEvent — when this
# toggle is on, the subscriber overrides the vanilla return value.
newMountSpeedScaling=true

# Force a mount-speed recalculation any time the creature is wounded
# (vanilla only repolls every ~20 ticks). Bytecode patch on
# Creature.setWounded that calls forceMountSpeedChange() before vanilla
# wound application.
updateMountSpeedOnDamage=true
