classname=com.garward.wurmmodloader.mods.economy.EconomyMod
sharedClassLoader=true

# ============================================================================
# Economy — NPC trader/economic balance changes. Ported from Sindusk's
# WyvernMods EconomicChanges module. Toggle names match upstream so existing
# operators can copy values from WyvernMods.properties without renaming.
#
# NOTE: Upstream's `adjustSealedMapValue` is intentionally not ported here;
# SealedMap pricing is custom-item logic and will land in the future Item
# submod, which can register its own ItemValueQuery handler.
# ============================================================================


# Drain 80% of all currency that flows into NPC traders' shop diff. The
# math matches upstream: when `money + shopDiff > 0` (the player is actually
# buying something), the resulting shopDiff is reduced to 20% of what it
# would have been. Implemented via the framework's ShopDiffEvent.
voidTraderMoney=true

# Stop NPC traders from refilling their stock off the kingdom's coffers.
# Bytecode patch on Creature.removeRandomItems forces the random
# "remove N items" roll to 1 (vanilla 0..N), preventing the stock churn.
disableTraderRefill=true
