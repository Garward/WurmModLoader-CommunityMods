classname=com.garward.wurmmodloader.mods.extraactions.ExtraActionsMod
sharedClassLoader=true

# ============================================================================
# ExtraActions — small grab-bag of generic right-click actions ported from
# Sindusk's WyvernMods action grouping (the upstream `enableActionModule`
# block). Only the self-contained actions live here; Arena/Mission/Sorcery
# actions belong with their owning submods (teleport / mission / item ports)
# and Leaderboard actions wait on the LeaderboardQuestion port.
# ============================================================================

# ----- Body-menu: Unequip all armour -----
# Adds an "Unequip all armour" entry on your own body. Walks the body's
# attached items and unequips anything tagged isArmour() back into inventory.
# Off by default — most servers won't want it.
unequipAllArmour=false

# ----- Item-menu: Receive all mail (courier mailboxes) -----
# Adds a "Receive all mail" entry on any courier-enchanted mailbox you stand
# next to. Pulls every non-rejected, non-CoD mail item the player has been
# sent (up to 100) into the mailbox in one shot. Mailbox must be empty first.
# Off by default.
receiveAllMail=false

# ----- Tile-menu: Smooth Terrain (GM tool, power >= 5) -----
# Adds a "Smooth Terrain" entry on any tile menu when the performer has
# power >= 5. Smooths bumps and slants in a 20x20 area around the target
# tile. Useful for cleaning up jagged terrain on PvE servers; upstream
# disables itself on PvP. Action gating still requires GM power on use.
smoothTerrain=false

# ----- Body-menu: Creature Report (GM tool, power >= 5) -----
# Adds a "Creature Report" entry on your own body when the performer has
# power >= 5. Dumps a categorized aggressive/passive creature population
# tally to your event log. Read-only — useful for PvE balance tuning.
creatureReport=false
