classname=com.garward.wurmmodloader.mods.customtitles.CustomTitlesMod
sharedClassLoader=true

# ============================================================================
# CustomTitles — register additional Titles.Title enum entries from config and
# award them to specific players on login. Ported from Sindusk's WyvernMods
# PlayerTitles module; toggle / property names match upstream so existing
# operators can copy values from WyvernMods.properties without renaming.
# ============================================================================

# ---------------------------------------------------------------------------
# Title definitions
#
# addCustomTitle.<key> = id, maleName, femaleName, skillId, type
#
#   id         numeric id (must be unique across all custom titles loaded
#              from any mod). Vanilla title ids stop in the low thousands
#              so values >= 10000 are recommended.
#   maleName   display name for male characters (no spaces around commas).
#   femaleName display name for female characters.
#   skillId    skill number for skill-bound titles, or -1 for general titles.
#   type       NORMAL  — general titles
#              MINOR   — 70-skill titles
#              MASTER  — 90-skill titles
#              LEGENDARY — 100-skill titles
#
# Example:
#   addCustomTitle.legend  = 9000, the Legend, the Legend, -1, NORMAL
#   addCustomTitle.donator = 9001, Donator,    Donator,    -1, NORMAL
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Award assignments
#
# awardTitle.<key> = id, playerName1, playerName2, ...
#
#   id          must match a title id registered via addCustomTitle (or any
#               vanilla title id).
#   playerName  matched case-sensitively against Player.getName(). The title
#               is granted on each login, so setting it in config is enough.
#
# Example:
#   awardTitle.legends  = 9000, Garward, Sindusk
#   awardTitle.donators = 9001, Bob
# ---------------------------------------------------------------------------
