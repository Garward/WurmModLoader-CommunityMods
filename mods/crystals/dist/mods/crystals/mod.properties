classname=com.garward.wurmmodloader.mods.crystals.CrystalsMod
sharedClassLoader=true

# ============================================================================
# crystals — chaos crystals + enchanters crystals + crystal combine.
#
# Two custom item templates and three actions:
#   * mod.chaoscrystal               -- chaos crystal (rarity-step infusion)
#   * mod.item.crystal.enchanters    -- enchanters crystal (enchant manipulation)
#   * Infuse (chaos)                 -- chaos crystal + repairable item
#   * Infuse (enchanters)            -- enchanters crystal + enchanted item
#   * Combine (crystal)              -- two same-type same-rarity crystals
#
# Ported from Sindusk's WyvernMods Crystals + the three Crystal*Action
# classes. Caches and Soulstealing pick the registered template ids up at
# runtime; no compile-time coupling.
# ============================================================================

# Master toggle. When false, no templates are registered and no actions are
# wired up.
enabled=true
